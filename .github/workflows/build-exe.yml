name: Build Windows EXE

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Build with PyInstaller
        run: |
          pyinstaller --onefile --name=智慧办案助手 `
            --add-data "templates;templates" `
            --add-data "static;static" `
            --hidden-import=docx `
            --hidden-import=sqlite3 `
            --hidden-import=flask `
            --hidden-import=jinja2 `
            --clean `
            --noconsole `
            app.py

      - name: Package portable folder
        run: |
          mkdir dist\智慧办案助手
          copy dist\智慧办案助手.exe dist\智慧办案助手\
          xcopy templates dist\智慧办案助手\templates\ /E /I
          xcopy static dist\智慧办案助手\static\ /E /I
          echo 1. 复制 OnlyOffice SDK: 把 static\packages\ 目录完整复制到这里 > dist\智慧办案助手\使用说明.txt
          echo 2. 双击 智慧办案助手.exe 启动                  >> dist\智慧办案助手\使用说明.txt
          echo 3. 浏览器打开 http://localhost:5050            >> dist\智慧办案助手\使用说明.txt
          echo 默认模版管理从零开始，请在页面上传                >> dist\智慧办案助手\使用说明.txt

          # 打包成 ZIP
          powershell Compress-Archive -Path dist\智慧办案助手 -DestinationPath dist\智慧办案助手-便携版.zip

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: 智慧办案助手
          path: dist/智慧办案助手.exe

      - name: Upload portable ZIP
        uses: actions/upload-artifact@v4
        with:
          name: 智慧办案助手-便携版
          path: dist/智慧办案助手-便携版.zip

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            dist/智慧办案助手.exe
            dist/智慧办案助手-便携版.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
